services:
  postgres:
    image: postgres:16-alpine
    container_name: streamflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: streamflow
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    container_name: streamflow_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.25

  minio:
    image: minio/minio:latest
    container_name: streamflow_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    cpus: 1

  minio-init:
    image: minio/mc:latest
    container_name: streamflow_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "sleep 5 && mc alias set myminio http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD} && mc mb myminio/raw-uploads --ignore-existing && mc mb myminio/production-vod --ignore-existing && mc mb myminio/thumbnails --ignore-existing && mc anonymous set download myminio/production-vod && mc anonymous set download myminio/thumbnails && exit 0"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamflow_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/streamflow
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET_RAW: raw-uploads
      MINIO_BUCKET_VOD: production-vod
      MINIO_BUCKET_THUMBS: thumbnails
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamflow_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://backend:3001}/v1
      NEXT_PUBLIC_MINIO_URL: ${MINIO_INTERNAL_URL:-http://minio:9000}
    depends_on:
      - backend
    mem_limit: 512m
    cpus: 0.5

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    driver: bridge
